<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LAZARUS RAT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #e0e6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(17, 26, 36, 0.7);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 24px 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ffcc, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .sub {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .video-container {
      background: #0b0e14;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 12px;
      margin-bottom: 16px;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    video {
      width: 100%;
      border-radius: 8px;
      background: #0b0e14;
      display: none;
    }
    video.active { display: block; }
    .placeholder {
      color: #4a5568;
      font-size: 14px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
      touch-action: manipulation;
      flex: 1;
      min-width: 100px;
    }
    .controls button:active { transform: scale(0.96); }
    .btn-host { background: #fbbf24; color: #0b0e14; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-copy { background: #1a73e8; color: #fff; }
    .btn-connect { background: #22c55e; color: #fff; }
    .status {
      margin: 12px 0 10px;
      font-size: 13px;
      color: #8a9bb0;
    }
    .status .green { color: #22c55e; }
    .status .red { color: #ef4444; }
    .hidden { display: none; }
    .room-id {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px;
      font-family: monospace;
      font-size: 20px;
      color: #fbbf24;
      letter-spacing: 2px;
      margin: 10px 0;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    .input-group input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: #e0e6f0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .input-group input:focus { border-color: #7c3aed; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2632;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="container">
  <h1>🖥️ ScreenShare RAT</h1>
  <div class="sub">Share your screen — no install required</div>

  <div class="video-container">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="placeholder" id="placeholder">Waiting for connection...</div>
  </div>

  <div class="status" id="status">🔴 Not connected</div>

  <div id="hostSection">
    <div class="room-id" id="roomIdDisplay">Loading...</div>
    <div class="controls">
      <button class="btn-copy" id="copyBtn">📋 Copy Room ID</button>
    </div>
  </div>

  <div id="clientSection">
    <div class="input-group">
      <input type="text" id="roomInput" placeholder="Enter 6‑digit room code..." maxlength="6" />
      <button class="btn-connect" id="connectBtn">🔗 Join</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn-host" id="hostBtn">🎥 Share Screen</button>
    <button class="btn-stop hidden" id="stopBtn">⏹️ Stop</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // SCREENSHARE RAT — WebRTC with Built‑in Signalling
  // ============================================================

  // ---- CONFIG ----
  const STUN = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
    ]
  };

  // ---- DOM ----
  const remoteVideo = document.getElementById('remoteVideo');
  const statusEl = document.getElementById('status');
  const roomIdDisplay = document.getElementById('roomIdDisplay');
  const roomInput = document.getElementById('roomInput');
  const connectBtn = document.getElementById('connectBtn');
  const hostBtn = document.getElementById('hostBtn');
  const stopBtn = document.getElementById('stopBtn');
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const placeholder = document.getElementById('placeholder');

  // ---- STATE ----
  let peer = null;
  let dataChannel = null;
  let localStream = null;
  let isHost = false;
  let roomId = '';
  let clientPeer = null;

  // ---- TOAST ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ---- SET STATUS ----
  function setStatus(text, color = '#8a9bb0') {
    statusEl.innerHTML = text;
    statusEl.style.color = color;
  }

  // ---- GENERATE ROOM ID ----
  function generateRoomId() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // ---- COPY ----
  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(roomId).then(() => showToast('✅ Room ID copied!'));
  });

  // ---- HOST: SHARE SCREEN ----
  hostBtn.addEventListener('click', async function() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      showToast('❌ Screen sharing is only supported on desktop browsers.');
      return;
    }

    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always' },
        audio: false,
      });

      isHost = true;
      hostBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');

      // Generate room ID
      roomId = generateRoomId();
      roomIdDisplay.textContent = roomId;

      // Create peer
      peer = new RTCPeerConnection(STUN);
      localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

      // Data channel for control
      dataChannel = peer.createDataChannel('control');
      dataChannel.onopen = () => setStatus('🟢 Hosting — waiting for client', '#22c55e');
      dataChannel.onmessage = (e) => {
        const data = JSON.parse(e.data);
        handleControl(data);
      };

      // On ICE candidate
      peer.onicecandidate = (event) => {
        if (event.candidate) return;
        // Offer ready
      };

      peer.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
        remoteVideo.classList.add('active');
        placeholder.style.display = 'none';
        setStatus('🟢 Client connected!', '#22c55e');
        showToast('🟢 Client connected!');
      };

      // Create offer
      const offer = await peer.createOffer();
      await peer.setLocalDescription(offer);

      // Store offer in localStorage with room ID
      localStorage.setItem('rat_offer_' + roomId, JSON.stringify({
        sdp: peer.localDescription.sdp,
        type: peer.localDescription.type
      }));

      setStatus('🟡 Hosting — Room ID: ' + roomId, '#fbbf24');
      showToast('✅ Hosting started! Share the Room ID with client.');

    } catch (err) {
      showToast('❌ Failed to share screen: ' + err.message);
    }
  });

  // ---- STOP ----
  stopBtn.addEventListener('click', function() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    if (peer) {
      peer.close();
      peer = null;
    }
    isHost = false;
    hostBtn.classList.remove('hidden');
    stopBtn.classList.add('hidden');
    remoteVideo.classList.remove('active');
    remoteVideo.srcObject = null;
    placeholder.style.display = 'block';
    setStatus('🔴 Stopped', '#ef4444');
    showToast('⏹️ Session ended');
    // Clean up stored offer
    if (roomId) {
      localStorage.removeItem('rat_offer_' + roomId);
    }
  });

  // ---- CLIENT: CONNECT ----
  connectBtn.addEventListener('click', async function() {
    const room = roomInput.value.trim();
    if (!room || room.length !== 6) {
      showToast('❌ Please enter a valid 6‑digit room code.');
      return;
    }

    const offerData = localStorage.getItem('rat_offer_' + room);
    if (!offerData) {
      showToast('❌ Room not found. Make sure the host is running.');
      return;
    }

    try {
      const offer = JSON.parse(offerData);
      clientPeer = new RTCPeerConnection(STUN);

      clientPeer.ondatachannel = (event) => {
        dataChannel = event.channel;
        dataChannel.onopen = () => setStatus('🟢 Connected to host', '#22c55e');
        dataChannel.onmessage = (e) => {
          const data = JSON.parse(e.data);
          handleControl(data);
        };
      };

      clientPeer.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
        remoteVideo.classList.add('active');
        placeholder.style.display = 'none';
        setStatus('🟢 Connected! Viewing host screen', '#22c55e');
        showToast('✅ Connected to host!');
      };

      await clientPeer.setRemoteDescription({
        sdp: offer.sdp,
        type: offer.type
      });

      const answer = await clientPeer.createAnswer();
      await clientPeer.setLocalDescription(answer);

      // Store answer for host (if needed)
      localStorage.setItem('rat_answer_' + room, JSON.stringify({
        sdp: clientPeer.localDescription.sdp,
        type: clientPeer.localDescription.type
      }));

      setStatus('🟢 Connected to host', '#22c55e');
    } catch (err) {
      showToast('❌ Failed to connect: ' + err.message);
    }
  });

  // ---- HANDLE CONTROL (Mouse/Keyboard) ----
  function handleControl(data) {
    // For now, just log control events
    // Future: implement mouse/keyboard relay
    console.log('Control:', data);
  }

  // ---- KEYBOARD SHORTCUTS ----
  document.addEventListener('keydown', (e) => {
    if (dataChannel && dataChannel.readyState === 'open') {
      dataChannel.send(JSON.stringify({
        type: 'keydown',
        key: e.key,
        code: e.code,
        ctrlKey: e.ctrlKey,
        shiftKey: e.shiftKey,
        altKey: e.altKey,
        metaKey: e.metaKey
      }));
    }
  });

  // ---- MOUSE EVENTS (on video) ----
  remoteVideo.addEventListener('click', (e) => {
    if (!dataChannel || dataChannel.readyState !== 'open') return;
    const rect = remoteVideo.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    dataChannel.send(JSON.stringify({
      type: 'click',
      x: x,
      y: y,
      button: e.button
    }));
  });

  remoteVideo.addEventListener('mousemove', (e) => {
    if (!dataChannel || dataChannel.readyState !== 'open') return;
    const rect = remoteVideo.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    dataChannel.send(JSON.stringify({
      type: 'mousemove',
      x: x,
      y: y
    }));
  });

  // ---- KEYBOARD SHORTCUT: ESC to disconnect ----
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (clientPeer) {
        clientPeer.close();
        clientPeer = null;
        remoteVideo.classList.remove('active');
        remoteVideo.srcObject = null;
        placeholder.style.display = 'block';
        setStatus('🔴 Disconnected', '#ef4444');
        showToast('🔌 Disconnected');
      }
    }
  });

  // ---- INIT ----
  setStatus('🔴 Not connected', '#ef4444');
  roomIdDisplay.textContent = 'Loading...';
  showToast('📡 Open this page on two devices — host on desktop, client on mobile.');
</script>
</body>
</html>
