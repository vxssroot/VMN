<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VNC Remote</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: #141a24;
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px solid #2a2f3a;
      text-align: center;
    }
    h1 { color: #fbbf24; font-size: 22px; margin-bottom: 4px; }
    .sub { color: #8a9bb0; font-size: 13px; margin-bottom: 20px; }
    .video-container {
      background: #0b0e14;
      border-radius: 16px;
      border: 1px solid #2a2f3a;
      padding: 12px;
      margin-bottom: 16px;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    video {
      width: 100%;
      border-radius: 8px;
      background: #0b0e14;
      display: none;
    }
    video.active { display: block; }
    .placeholder {
      color: #4a5568;
      font-size: 14px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      flex: 1;
      min-width: 100px;
    }
    .controls button:active { transform: scale(0.96); }
    .btn-host { background: #fbbf24; color: #0b0e14; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-copy { background: #1a73e8; color: #fff; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #8a9bb0;
    }
    .status .green { color: #22c55e; }
    .status .red { color: #ef4444; }
    .hidden { display: none; }
    .peer-id {
      background: #0b0e14;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a2f3a;
      font-family: monospace;
      font-size: 14px;
      color: #fbbf24;
      word-break: break-all;
      margin: 10px 0;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    .input-group input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2a2f3a;
      background: #0b0e14;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .input-group input:focus { border-color: #fbbf24; }
    .input-group button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #fbbf24;
      color: #0b0e14;
      font-weight: 700;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2632;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid #2a2f3a;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="container">
  <h1>🖥️ VNC Remote</h1>
  <div class="sub">Share your screen — no install required</div>

  <div class="video-container">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="placeholder" id="placeholder">Waiting for connection...</div>
  </div>

  <div class="status" id="status">🔴 Not connected</div>

  <div id="hostSection">
    <div class="peer-id" id="peerIdDisplay">Generating...</div>
    <div class="input-group">
      <button class="btn-copy" id="copyBtn">📋 Copy ID</button>
    </div>
  </div>

  <div id="clientSection">
    <div class="input-group">
      <input type="text" id="peerInput" placeholder="Enter host ID to connect..." />
      <button id="connectBtn">🔗 Connect</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn-host" id="hostBtn">🎥 Share Screen</button>
    <button class="btn-stop hidden" id="stopBtn">⏹️ Stop</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // VNC REMOTE — With WebRTC & PeerJS (free signaling)
  // ============================================================

  // ---- CONFIG ----
  // Using a free public PeerJS server (no API key needed)
  const PEERJS_CONFIG = {
    host: '0.peerjs.com',
    port: 443,
    path: '/',
    secure: true,
  };

  // ---- DOM ----
  const remoteVideo = document.getElementById('remoteVideo');
  const statusEl = document.getElementById('status');
  const peerIdDisplay = document.getElementById('peerIdDisplay');
  const hostSection = document.getElementById('hostSection');
  const clientSection = document.getElementById('clientSection');
  const peerInput = document.getElementById('peerInput');
  const connectBtn = document.getElementById('connectBtn');
  const hostBtn = document.getElementById('hostBtn');
  const stopBtn = document.getElementById('stopBtn');
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const placeholder = document.getElementById('placeholder');

  let peer = null;
  let connection = null;
  let localStream = null;
  let isHost = false;
  let peerId = '';

  // ---- TOAST ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ---- SET STATUS ----
  function setStatus(text, color = '#8a9bb0') {
    statusEl.textContent = text;
    statusEl.style.color = color;
  }

  // ---- GENERATE PEER ID ----
  function generatePeerId() {
    return 'vnc-' + Math.random().toString(36).substring(2, 8);
  }

  // ---- COPY ----
  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(peerId).then(() => showToast('✅ Copied!'));
  });

  // ============================================================
  // HOST: SHARE SCREEN
  // ============================================================
  hostBtn.addEventListener('click', async function() {
    // Check if getDisplayMedia is available (desktop only)
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      showToast('❌ Screen sharing is only supported on desktop browsers.');
      return;
    }

    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always' },
        audio: false,
      });

      isHost = true;
      hostBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');

      // Create PeerJS peer
      peerId = generatePeerId();
      peer = new Peer(peerId, PEERJS_CONFIG);

      peer.on('open', (id) => {
        peerIdDisplay.textContent = id;
        setStatus('🟡 Hosting — share ID: ' + id, '#fbbf24');
        showToast('✅ Hosting started! Share your ID.');
      });

      peer.on('connection', (conn) => {
        connection = conn;
        conn.on('open', () => {
          setStatus('🟢 Client connected!', '#22c55e');
          showToast('🟢 Client connected!');
        });

        conn.on('data', (data) => {
          // Handle mouse/keyboard data from client
          console.log('Control:', data);
        });

        // Send screen stream
        const call = peer.call(conn.peer, localStream);
        call.on('stream', (remoteStream) => {
          remoteVideo.srcObject = remoteStream;
          remoteVideo.classList.add('active');
          placeholder.style.display = 'none';
        });
      });

      peer.on('error', (err) => {
        showToast('❌ Peer error: ' + err.message);
      });

    } catch (err) {
      showToast('❌ Failed to share: ' + err.message);
    }
  });

  // ============================================================
  // STOP HOSTING
  // ============================================================
  stopBtn.addEventListener('click', function() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    if (peer) {
      peer.destroy();
      peer = null;
    }
    isHost = false;
    hostBtn.classList.remove('hidden');
    stopBtn.classList.add('hidden');
    remoteVideo.classList.remove('active');
    remoteVideo.srcObject = null;
    placeholder.style.display = 'block';
    setStatus('🔴 Stopped', '#ef4444');
    showToast('⏹️ Session ended');
  });

  // ============================================================
  // CLIENT: CONNECT TO HOST
  // ============================================================
  connectBtn.addEventListener('click', function() {
    const targetId = peerInput.value.trim();
    if (!targetId) {
      showToast('❌ Please enter a host ID.');
      return;
    }

    // Create client peer (random ID)
    const clientPeer = new Peer(generatePeerId(), PEERJS_CONFIG);

    clientPeer.on('open', () => {
      // Connect to host
      const conn = clientPeer.connect(targetId);
      connection = conn;

      conn.on('open', () => {
        setStatus('🟢 Connected to host!', '#22c55e');
        showToast('✅ Connected to host!');
      });

      // Receive screen stream
      clientPeer.on('call', (call) => {
        call.answer(); // no stream from client
        call.on('stream', (remoteStream) => {
          remoteVideo.srcObject = remoteStream;
          remoteVideo.classList.add('active');
          placeholder.style.display = 'none';
        });
      });

      conn.on('data', (data) => {
        console.log('From host:', data);
      });

      conn.on('close', () => {
        setStatus('🔴 Disconnected', '#ef4444');
        showToast('🔌 Disconnected from host');
        remoteVideo.classList.remove('active');
        remoteVideo.srcObject = null;
        placeholder.style.display = 'block';
      });

      conn.on('error', (err) => {
        showToast('❌ Connection error: ' + err.message);
      });
    });

    clientPeer.on('error', (err) => {
      showToast('❌ Failed to connect: ' + err.message);
    });
  });

  // ---- KEYBOARD SHORTCUT: ESCAPE TO DISCONNECT ----
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (connection) {
        connection.close();
        connection = null;
        remoteVideo.classList.remove('active');
        remoteVideo.srcObject = null;
        placeholder.style.display = 'block';
        setStatus('🔴 Disconnected', '#ef4444');
        showToast('🔌 Disconnected');
      }
    }
  });

  // ---- INIT ----
  setStatus('🔴 Not connected', '#ef4444');
  showToast('📡 Open this page on two devices — host on desktop, client on mobile.');
</script>
</body>
</html>
