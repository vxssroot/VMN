<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ScreenShare RAT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #e0e6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(17, 26, 36, 0.7);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 24px 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ffcc, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    .video-container {
      background: #0b0e14;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 12px;
      margin-bottom: 16px;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    video { width: 100%; border-radius: 8px; background: #0b0e14; display: none; }
    video.active { display: block; }
    .placeholder { color: #4a5568; font-size: 14px; }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
      touch-action: manipulation;
      flex: 1;
      min-width: 100px;
    }
    .controls button:active { transform: scale(0.96); }
    .btn-host { background: #fbbf24; color: #0b0e14; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-copy { background: #1a73e8; color: #fff; }
    .btn-connect { background: #22c55e; color: #fff; }
    .status { margin: 12px 0 10px; font-size: 13px; color: #8a9bb0; }
    .status .green { color: #22c55e; }
    .status .red { color: #ef4444; }
    .hidden { display: none; }
    .room-id {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px;
      font-family: monospace;
      font-size: 20px;
      color: #fbbf24;
      letter-spacing: 2px;
      margin: 10px 0;
    }
    .input-group { display: flex; gap: 8px; margin: 8px 0; }
    .input-group input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: #e0e6f0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .input-group input:focus { border-color: #7c3aed; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2632;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="container">
  <h1>🖥️ ScreenShare RAT</h1>
  <div class="sub">Share your screen — no install required</div>

  <div class="video-container">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="placeholder" id="placeholder">Waiting for connection...</div>
  </div>

  <div class="status" id="status">🔴 Not connected</div>

  <div id="hostSection">
    <div class="room-id" id="roomIdDisplay">Loading...</div>
    <div class="controls">
      <button class="btn-copy" id="copyBtn">📋 Copy Room ID</button>
    </div>
  </div>

  <div id="clientSection">
    <div class="input-group">
      <input type="text" id="roomInput" placeholder="Enter 6‑digit room code..." maxlength="6" />
      <button class="btn-connect" id="connectBtn">🔗 Join</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn-host" id="hostBtn">🎥 Share Screen</button>
    <button class="btn-stop hidden" id="stopBtn">⏹️ Stop</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // SCREENSHARE RAT — PowerShell Server (Local)
  // ============================================================

  // ---- CONFIG ----
  const SIGNALING_SERVER = 'ws://localhost:8080'; // Replace with your IP for remote testing

  // ---- DOM ----
  const remoteVideo = document.getElementById('remoteVideo');
  const statusEl = document.getElementById('status');
  const roomIdDisplay = document.getElementById('roomIdDisplay');
  const roomInput = document.getElementById('roomInput');
  const connectBtn = document.getElementById('connectBtn');
  const hostBtn = document.getElementById('hostBtn');
  const stopBtn = document.getElementById('stopBtn');
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const placeholder = document.getElementById('placeholder');

  // ---- STATE ----
  let ws = null;
  let roomId = '';
  let isHost = false;
  let peerConnection = null;
  let localStream = null;

  // ---- TOAST ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ---- SET STATUS ----
  function setStatus(text, color = '#8a9bb0') {
    statusEl.innerHTML = text;
    statusEl.style.color = color;
  }

  // ---- CONNECT WS ----
  function connectWS() {
    ws = new WebSocket(SIGNALING_SERVER);
    ws.onopen = () => console.log('WS connected');
    ws.onerror = () => showToast('❌ Failed to connect to signalling server.');
    ws.onclose = () => {
      setTimeout(connectWS, 3000);
    };
  }

  // ---- WS MESSAGES ----
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === 'created') {
      roomId = data.roomId;
      roomIdDisplay.textContent = roomId;
      setStatus('🟡 Hosting — Room ID: ' + roomId, '#fbbf24');
      showToast('✅ Hosting started!');
    }

    if (data.type === 'joined') {
      setStatus('🟢 Connected to host!', '#22c55e');
      showToast('✅ Connected to host!');
      peerConnection = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });
      peerConnection.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
        remoteVideo.classList.add('active');
        placeholder.style.display = 'none';
      };
      if (isHost && localStream) {
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
      }
    }

    if (data.type === 'offer') {
      peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
      peerConnection.createAnswer().then(answer => {
        peerConnection.setLocalDescription(answer);
        ws.send(JSON.stringify({ type: 'answer', answer, roomId: data.roomId }));
      });
    }

    if (data.type === 'answer') {
      peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
    }

    if (data.type === 'candidate') {
      peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
    }

    if (data.type === 'error') {
      showToast('❌ ' + data.message);
    }
  };

  // ---- HOST ----
  hostBtn.addEventListener('click', async function() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      showToast('❌ Screen sharing only works on desktop browsers.');
      return;
    }

    if (!ws || ws.readyState !== WebSocket.OPEN) {
      showToast('❌ Connecting to server...');
      return;
    }

    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always' },
        audio: false,
      });

      isHost = true;
      hostBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');

      ws.send(JSON.stringify({ type: 'create' }));
    } catch (err) {
      showToast('❌ Failed to share: ' + err.message);
    }
  });

  // ---- STOP ----
  stopBtn.addEventListener('click', function() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    if (peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    isHost = false;
    hostBtn.classList.remove('hidden');
    stopBtn.classList.add('hidden');
    remoteVideo.classList.remove('active');
    remoteVideo.srcObject = null;
    placeholder.style.display = 'block';
    setStatus('🔴 Stopped', '#ef4444');
    showToast('⏹️ Session ended');
  });

  // ---- CONNECT ----
  connectBtn.addEventListener('click', function() {
    const id = roomInput.value.trim();
    if (!id) { showToast('❌ Enter a Room ID.'); return; }
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      showToast('❌ Connecting to server...');
      return;
    }
    ws.send(JSON.stringify({ type: 'join', roomId: id }));
  });

  // ---- COPY ----
  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(roomId).then(() => showToast('✅ Room ID copied!'));
  });

  // ---- INIT ----
  connectWS();
  setStatus('🔴 Not connected', '#ef4444');
  roomIdDisplay.textContent = 'Loading...';
  showToast('📡 Open this page on two devices.');
</script>
</body>
</html>
