<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ScreenShare RAT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #e0e6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(17, 26, 36, 0.7);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 24px 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #00ffcc, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    .video-container {
      background: #0b0e14;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 12px;
      margin-bottom: 16px;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    video { width: 100%; border-radius: 8px; background: #0b0e14; display: none; }
    video.active { display: block; }
    .placeholder { color: #4a5568; font-size: 14px; }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      font-family: inherit;
      touch-action: manipulation;
      flex: 1;
      min-width: 100px;
    }
    .controls button:active { transform: scale(0.96); }
    .btn-host { background: #fbbf24; color: #0b0e14; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-copy { background: #1a73e8; color: #fff; }
    .btn-connect { background: #22c55e; color: #fff; }
    .status { margin: 12px 0 10px; font-size: 13px; color: #8a9bb0; }
    .status .green { color: #22c55e; }
    .status .red { color: #ef4444; }
    .hidden { display: none; }
    .room-id {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px;
      font-family: monospace;
      font-size: 20px;
      color: #fbbf24;
      letter-spacing: 2px;
      margin: 10px 0;
    }
    .input-group { display: flex; gap: 8px; margin: 8px 0; }
    .input-group input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: #e0e6f0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .input-group input:focus { border-color: #7c3aed; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2632;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="container">
  <h1>🖥️ ScreenShare RAT</h1>
  <div class="sub">Share your screen — no install required</div>

  <div class="video-container">
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="placeholder" id="placeholder">Waiting for connection...</div>
  </div>

  <div class="status" id="status">🔴 Not connected</div>

  <div id="hostSection">
    <div class="room-id" id="roomIdDisplay">Loading...</div>
    <div class="controls">
      <button class="btn-copy" id="copyBtn">📋 Copy Room ID</button>
    </div>
  </div>

  <div id="clientSection">
    <div class="input-group">
      <input type="text" id="roomInput" placeholder="Enter 6‑digit room code..." maxlength="6" />
      <button class="btn-connect" id="connectBtn">🔗 Join</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn-host" id="hostBtn">🎥 Share Screen</button>
    <button class="btn-stop hidden" id="stopBtn">⏹️ Stop</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  // ============================================================
  // SCREENSHARE RAT — Firebase Realtime Database Signalling
  // Works on Any Device (Phone, Laptop, Tablet)
  // ============================================================

  // ---- FIREBASE CONFIG (FREE PUBLIC DATABASE) ----
  const firebaseConfig = {
    apiKey: "AIzaSyB4Nk0Dn6nP8dVqvS7Zq5Y8Qv0Zq5Y8Qv0",
    authDomain: "screenshare-rat.firebaseapp.com",
    databaseURL: "https://screenshare-rat-default-rtdb.firebaseio.com",
    projectId: "screenshare-rat",
    storageBucket: "screenshare-rat.appspot.com",
    messagingSenderId: "1234567890",
    appId: "1:1234567890:web:1234567890"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ---- DOM ----
  const remoteVideo = document.getElementById('remoteVideo');
  const statusEl = document.getElementById('status');
  const roomIdDisplay = document.getElementById('roomIdDisplay');
  const roomInput = document.getElementById('roomInput');
  const connectBtn = document.getElementById('connectBtn');
  const hostBtn = document.getElementById('hostBtn');
  const stopBtn = document.getElementById('stopBtn');
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const placeholder = document.getElementById('placeholder');

  // ---- STATE ----
  let roomId = '';
  let isHost = false;
  let peerConnection = null;
  let localStream = null;
  let roomRef = null;
  let isConnected = false;

  // ---- TOAST ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ---- SET STATUS ----
  function setStatus(text, color = '#8a9bb0') {
    statusEl.innerHTML = text;
    statusEl.style.color = color;
  }

  // ---- GENERATE ROOM ID ----
  function generateRoomId() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // ---- COPY ----
  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(roomId).then(() => showToast('✅ Room ID copied!'));
  });

  // ---- CREATE PEER CONNECTION ----
  function createPeerConnection() {
    const config = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun.services.mozilla.com' },
        { urls: 'stun:global.stun.twilio.com:3478' }
      ]
    };
    peerConnection = new RTCPeerConnection(config);

    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        // Send candidate to Firebase
        const candidateRef = roomRef.child('candidates');
        candidateRef.push(event.candidate.toJSON());
      }
    };

    peerConnection.ontrack = (event) => {
      remoteVideo.srcObject = event.streams[0];
      remoteVideo.classList.add('active');
      placeholder.style.display = 'none';
      setStatus('🟢 Connected!', '#22c55e');
      showToast('✅ Connected!');
    };

    return peerConnection;
  }

  // ---- HOST: SHARE SCREEN ----
  hostBtn.addEventListener('click', async function() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
      showToast('❌ Screen sharing is only supported on desktop browsers.');
      return;
    }

    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always' },
        audio: false,
      });

      isHost = true;
      hostBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');

      // Generate room ID
      roomId = generateRoomId();
      roomIdDisplay.textContent = roomId;

      // Create Firebase room
      roomRef = db.ref('rooms/' + roomId);
      await roomRef.set({ host: true, created: Date.now() });

      setStatus('🟡 Hosting — Room ID: ' + roomId, '#fbbf24');
      showToast('✅ Hosting started! Share your Room ID.');

      // Create peer connection
      peerConnection = createPeerConnection();
      localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

      // Listen for client's answer
      roomRef.child('answer').on('value', (snapshot) => {
        const answer = snapshot.val();
        if (answer && peerConnection) {
          peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
          roomRef.child('answer').off();
          isConnected = true;
        }
      });

      // Listen for client's candidates
      roomRef.child('candidates').on('child_added', (snapshot) => {
        const candidate = snapshot.val();
        if (peerConnection && candidate) {
          peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        }
      });

      // Create offer
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      await roomRef.child('offer').set(offer);

    } catch (err) {
      showToast('❌ Failed to share: ' + err.message);
    }
  });

  // ---- CLIENT: CONNECT ----
  connectBtn.addEventListener('click', async function() {
    const room = roomInput.value.trim();
    if (!room || room.length !== 6) {
      showToast('❌ Please enter a valid 6‑digit room code.');
      return;
    }

    roomId = room;
    roomRef = db.ref('rooms/' + room);

    // Check if room exists
    const snapshot = await roomRef.once('value');
    if (!snapshot.exists()) {
      showToast('❌ Room not found.');
      return;
    }

    setStatus('🟡 Connecting to room...', '#fbbf24');
    showToast('🟡 Connecting...');

    // Create peer connection
    peerConnection = createPeerConnection();

    // Listen for host's offer
    roomRef.child('offer').on('value', async (snapshot) => {
      const offer = snapshot.val();
      if (offer && peerConnection) {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));

        // Create answer
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        await roomRef.child('answer').set(answer);
        roomRef.child('offer').off();
      }
    });

    // Listen for host's candidates
    roomRef.child('candidates').on('child_added', (snapshot) => {
      const candidate = snapshot.val();
      if (peerConnection && candidate) {
        peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
      }
    });

    // Clean up room after connection
    setTimeout(() => {
      if (isConnected) {
        roomRef.update({ host: null, offer: null, answer: null, candidates: null });
      }
    }, 30000);

    // Handle room deletion
    roomRef.onDisconnect().remove();
  });

  // ---- STOP ----
  stopBtn.addEventListener('click', function() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    if (peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    if (roomRef) {
      roomRef.remove();
      roomRef = null;
    }
    isHost = false;
    isConnected = false;
    hostBtn.classList.remove('hidden');
    stopBtn.classList.add('hidden');
    remoteVideo.classList.remove('active');
    remoteVideo.srcObject = null;
    placeholder.style.display = 'block';
    setStatus('🔴 Stopped', '#ef4444');
    showToast('⏹️ Session ended');
  });

  // ---- KEYBOARD SHORTCUT: ESC to disconnect ----
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      stopBtn.click();
    }
  });

  // ---- INIT ----
  setStatus('🔴 Not connected', '#ef4444');
  roomIdDisplay.textContent = 'Loading...';
  showToast('📡 Open this page on two devices — host on desktop, client on any device.');
</script>
</body>
</html>
