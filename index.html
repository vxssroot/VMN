<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VNC - Remote Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: #141a24;
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px solid #2a2f3a;
      text-align: center;
    }
    h1 { color: #fbbf24; font-size: 22px; margin-bottom: 4px; }
    .sub { color: #8a9bb0; font-size: 13px; margin-bottom: 20px; }
    .video-container {
      background: #0b0e14;
      border-radius: 16px;
      border: 1px solid #2a2f3a;
      padding: 12px;
      margin-bottom: 16px;
      position: relative;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      border-radius: 8px;
      background: #0b0e14;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      flex: 1;
      min-width: 100px;
    }
    .controls button:active { transform: scale(0.96); }
    .btn-start { background: #22c55e; color: #0b0e14; }
    .btn-stop { background: #ef4444; color: #fff; }
    .btn-copy { background: #1a73e8; color: #fff; }
    .btn-host { background: #fbbf24; color: #0b0e14; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #8a9bb0;
    }
    .status .green { color: #22c55e; }
    .status .red { color: #ef4444; }
    .hidden { display: none; }
    .peer-id {
      background: #0b0e14;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a2f3a;
      font-family: monospace;
      font-size: 14px;
      color: #fbbf24;
      word-break: break-all;
      margin: 10px 0;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    .input-group input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2a2f3a;
      background: #0b0e14;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .input-group input:focus { border-color: #fbbf24; }
    .input-group button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #fbbf24;
      color: #0b0e14;
      font-weight: 700;
      cursor: pointer;
    }
    .input-group button:active { transform: scale(0.96); }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2632;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid #2a2f3a;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="container" id="app">
  <h1>🖥️ VNC Remote</h1>
  <div class="sub">Share your screen or view someone else's — no install required</div>

  <!-- Video Display -->
  <div class="video-container" id="videoContainer">
    <video id="remoteVideo" autoplay playsinline></video>
    <div style="position:absolute;color:#4a5568;font-size:14px;" id="placeholderText">Waiting for connection...</div>
  </div>

  <!-- Status -->
  <div class="status" id="status">🔴 Not connected</div>

  <!-- Peer ID (for host) -->
  <div id="hostSection" class="hidden">
    <div class="peer-id" id="peerIdDisplay">Generating...</div>
    <div class="input-group">
      <button class="btn-copy" id="copyBtn">📋 Copy ID</button>
    </div>
  </div>

  <!-- Client: Enter Host ID -->
  <div id="clientSection">
    <div class="input-group">
      <input type="text" id="peerInput" placeholder="Enter host ID to connect..." />
      <button id="connectBtn">🔗 Connect</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-host" id="hostBtn">🎥 Share Screen</button>
    <button class="btn-start hidden" id="startBtn">▶️ Start</button>
    <button class="btn-stop hidden" id="stopBtn">⏹️ Stop</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // VNC REMOTE — WebRTC Screen Sharing
  // ============================================================

  // ---- CONFIG ----
  const STUN = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ]
  };

  // ---- DOM ----
  const remoteVideo = document.getElementById('remoteVideo');
  const statusEl = document.getElementById('status');
  const peerIdDisplay = document.getElementById('peerIdDisplay');
  const hostSection = document.getElementById('hostSection');
  const clientSection = document.getElementById('clientSection');
  const peerInput = document.getElementById('peerInput');
  const connectBtn = document.getElementById('connectBtn');
  const hostBtn = document.getElementById('hostBtn');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const placeholderText = document.getElementById('placeholderText');

  // ---- STATE ----
  let peer = null;
  let connection = null;
  let isHost = false;
  let localStream = null;
  let dataChannel = null;

  // ---- TOAST ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ---- UPDATE STATUS ----
  function setStatus(text, color = '#8a9bb0') {
    statusEl.innerHTML = text;
    statusEl.style.color = color;
  }

  // ---- GENERATE PEER ID ----
  function generatePeerId() {
    return 'VNC-' + Math.random().toString(36).substring(2, 8).toUpperCase();
  }

  // ---- COPY PEER ID ----
  copyBtn.addEventListener('click', function() {
    const id = peerIdDisplay.textContent;
    navigator.clipboard.writeText(id).then(() => showToast('✅ Copied!'));
  });

  // ---- HOST: START SCREEN SHARING ----
  hostBtn.addEventListener('click', async function() {
    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always' },
        audio: false,
      });

      isHost = true;
      hostSection.classList.remove('hidden');
      clientSection.classList.add('hidden');
      hostBtn.classList.add('hidden');
      startBtn.classList.remove('hidden');

      const peerId = generatePeerId();
      peerIdDisplay.textContent = peerId;

      // Start peer connection
      peer = new RTCPeerConnection(STUN);
      localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

      // Create data channel for control
      dataChannel = peer.createDataChannel('control');
      dataChannel.onopen = () => setStatus('🟢 Hosting (waiting for client)', '#22c55e');
      dataChannel.onmessage = (e) => {
        const data = JSON.parse(e.data);
        handleControl(data);
      };

      // On ICE candidate
      peer.onicecandidate = (event) => {
        if (event.candidate) return;
        // Offer ready
      };

      peer.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
        placeholderText.classList.add('hidden');
        setStatus('🟢 Client connected!', '#22c55e');
      };

      // Create offer
      const offer = await peer.createOffer();
      await peer.setLocalDescription(offer);

      // Store offer in localStorage so client can retrieve it
      localStorage.setItem('vnc_offer_' + peerId, JSON.stringify({
        sdp: peer.localDescription.sdp,
        type: peer.localDescription.type
      }));

      setStatus('🟡 Hosting — share this ID: ' + peerId, '#fbbf24');
      showToast('✅ Hosting started! Share the ID with client.');
    } catch (err) {
      showToast('❌ Failed to share screen: ' + err.message);
    }
  });

  // ---- START (after hosting) ----
  startBtn.addEventListener('click', function() {
    // Client connects automatically via the ID
    showToast('📡 Waiting for client to connect...');
  });

  // ---- STOP ----
  stopBtn.addEventListener('click', function() {
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
    if (peer) {
      peer.close();
      peer = null;
    }
    isHost = false;
    hostSection.classList.add('hidden');
    clientSection.classList.remove('hidden');
    hostBtn.classList.remove('hidden');
    startBtn.classList.add('hidden');
    remoteVideo.srcObject = null;
    placeholderText.classList.remove('hidden');
    setStatus('🔴 Stopped', '#ef4444');
    showToast('⏹️ Session ended');
  });

  // ---- CLIENT: CONNECT TO HOST ----
  connectBtn.addEventListener('click', async function() {
    const peerId = peerInput.value.trim();
    if (!peerId) {
      showToast('❌ Please enter a host ID.');
      return;
    }

    const offerData = localStorage.getItem('vnc_offer_' + peerId);
    if (!offerData) {
      showToast('❌ Host not found. Make sure the host is running.');
      return;
    }

    try {
      const offer = JSON.parse(offerData);
      peer = new RTCPeerConnection(STUN);

      peer.ondatachannel = (event) => {
        dataChannel = event.channel;
        dataChannel.onopen = () => setStatus('🟢 Connected to host', '#22c55e');
        dataChannel.onmessage = (e) => {
          const data = JSON.parse(e.data);
          handleControl(data);
        };
      };

      peer.ontrack = (event) => {
        remoteVideo.srcObject = event.streams[0];
        placeholderText.classList.add('hidden');
        setStatus('🟢 Connected! Viewing host screen', '#22c55e');
        showToast('✅ Connected to host!');
      };

      await peer.setRemoteDescription({
        sdp: offer.sdp,
        type: offer.type
      });

      const answer = await peer.createAnswer();
      await peer.setLocalDescription(answer);

      // Store answer for host (if needed for reconnection)
      setStatus('🟢 Connected to host', '#22c55e');
    } catch (err) {
      showToast('❌ Failed to connect: ' + err.message);
    }
  });

  // ---- HANDLE CONTROL (Mouse/Keyboard) ----
  function handleControl(data) {
    // For now, we just log control events
    // Future: implement mouse/keyboard relay
    console.log('Control:', data);
  }

  // ---- KEYBOARD SHORTCUTS ----
  document.addEventListener('keydown', (e) => {
    if (dataChannel && dataChannel.readyState === 'open') {
      dataChannel.send(JSON.stringify({
        type: 'keydown',
        key: e.key,
        code: e.code,
        ctrlKey: e.ctrlKey,
        shiftKey: e.shiftKey,
        altKey: e.altKey,
        metaKey: e.metaKey
      }));
    }
  });

  // ---- MOUSE EVENTS (on video) ----
  remoteVideo.addEventListener('click', (e) => {
    if (!dataChannel || dataChannel.readyState !== 'open') return;
    const rect = remoteVideo.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    dataChannel.send(JSON.stringify({
      type: 'click',
      x: x,
      y: y,
      button: e.button
    }));
  });

  remoteVideo.addEventListener('mousemove', (e) => {
    if (!dataChannel || dataChannel.readyState !== 'open') return;
    const rect = remoteVideo.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    dataChannel.send(JSON.stringify({
      type: 'mousemove',
      x: x,
      y: y
    }));
  });

  // ---- KEYBOARD SHORTCUT: ESC to disconnect ----
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (peer) {
        peer.close();
        peer = null;
        remoteVideo.srcObject = null;
        placeholderText.classList.remove('hidden');
        setStatus('🔴 Disconnected', '#ef4444');
        showToast('🔌 Disconnected');
      }
    }
  });

  // ---- INIT ----
  setStatus('🔴 Not connected', '#ef4444');
  showToast('📡 Open this page on two devices — host on one, client on the other.');
</script>
</body>
</html>
